name: SuperCoach Storage Reset

on:
  workflow_dispatch:
    inputs:
      confirm_text:
        description: Type WIPE to confirm storage reset
        required: true
        default: ""
        type: string

permissions:
  contents: write

env:
  SC_LEAGUE_ID: "21064"

jobs:
  reset:
    if: github.event.inputs.confirm_text == 'WIPE'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages("fs", repos = "https://cloud.r-project.org")'

      - name: Reset repo storage
        run: |
          Rscript scripts/reset_supercoach_storage.R

      - name: Commit cleared data state
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No storage changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/supercoach_league_21064
          git commit -m "[auto] Reset SuperCoach storage"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload reset artifact
        uses: actions/upload-artifact@v4
        with:
          name: supercoach-storage-reset-${{ github.run_id }}
          path: data/supercoach_league_21064
          if-no-files-found: error
